version: "3.8"

services:
  # Local PostgreSQL for development (Supabase is used in production)
  postgres:
    image: postgres:16-alpine
    container_name: 1pacent-postgres-1
    environment:
      POSTGRES_DB: 1pacent
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    restart: unless-stopped
    networks:
      - 1pacent-net

  # n8n: DELIBERATELY ABSENT. The VPS runs ONE shared n8n for every
  # application (/opt/n8n, container n8n-n8n-1, public at n8n.1pacent.com);
  # 1Pacent's workflows (n8n/workflows/*.json) are imported there — never
  # into a per-app instance. This service previously defined here was never
  # started and would port-conflict on 5678; removed in the 2026-07-13
  # consolidation (docs/RELEASE_NOTES_v8.md).

  # API backend — built from the app's own packages
  # api:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   container_name: 1pacent-api-1
  #   env_file: .env
  #   ports:
  #     - "${API_PORT:-3001}:3001"
  #   depends_on:
  #     - postgres
  #   restart: unless-stopped
  #   networks:
  #     - 1pacent-net

volumes:
  pgdata:

networks:
  1pacent-net:
    driver: bridge

